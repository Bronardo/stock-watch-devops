apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-watch-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-watch
  template:
    metadata:
      labels:
        app: stock-watch
    spec:
      containers:
      - name: stock-watch-container
        image: ${DOCKER_IMAGE}
        ports:
        - containerPort: 3000
        env:
        - name: FINNHUB_KEY
          valueFrom:
            secretKeyRef:
              name: stock-api-secret
              key: finnhub-key
---
apiVersion: v1
kind: Service
metadata:
  name: stock-watch-service
spec:
  type: NodePort
  selector:
    app: stock-watch
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 32000