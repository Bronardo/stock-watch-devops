apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-watch-api
  # namespace: staging  <-- We'll let Jenkins set this via 'kubectl apply -n'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-watch
  template:
    metadata:
      labels:
        app: stock-watch
    spec:
      containers:
      # --- The Node.js App ---
      - name: stock-watch-container
        image: ${DOCKER_IMAGE}
        ports:
        - containerPort: 3000
        env:
        - name: FINNHUB_KEY
          valueFrom:
            secretKeyRef:
              name: stock-api-secret
              key: finnhub-key
        - name: MONGO_URI
          value: "mongodb://localhost:27017/stockwatch"
        # Health checks (Required for Stage 7 Monitoring)
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15

      # --- The MongoDB Instance (Sidecar) ---
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: stock-watch-service
spec:
  type: NodePort
  selector:
    app: stock-watch
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 32000